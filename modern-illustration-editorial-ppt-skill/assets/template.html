<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Modern Illustration Editorial PPT Template</title>
  <style>
    :root {
      --beige: #f7f3ee;
      --blue: #a7c7e7;
      --orange: #e8a87c;
      --charcoal: #2f2f2f;
      --pale-blue: #eaf4fc;
      --pale-orange: #fce8da;
      --divider: #ded8d1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #e9e3dc;
      font-family: Inter, Arial, "Microsoft JhengHei", "Microsoft YaHei", sans-serif;
      color: var(--charcoal);
    }

    .deck {
      display: grid;
      gap: 32px;
      padding: 32px;
    }

    .slide {
      position: relative;
      width: min(1280px, 100%);
      aspect-ratio: 16 / 9;
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(222, 216, 209, 0.32) 0 1px, transparent 1px),
        var(--beige);
      background-size: 28px 28px;
      border: 1px solid var(--divider);
    }

    .kicker {
      position: absolute;
      left: 84px;
      top: 82px;
      font-size: 12px;
      font-weight: 700;
      color: var(--orange);
      text-transform: uppercase;
    }

    h1 {
      position: absolute;
      left: 82px;
      top: 158px;
      width: 560px;
      margin: 0;
      font-size: 64px;
      line-height: 1.06;
      font-weight: 800;
      letter-spacing: 0;
      color: var(--charcoal);
    }

    .subtitle {
      position: absolute;
      left: 86px;
      top: 438px;
      width: 440px;
      color: #5f5f5f;
      font-size: 20px;
      line-height: 1.5;
    }

    .illustration {
      position: absolute;
      right: 86px;
      top: 104px;
      width: 500px;
      height: 500px;
    }

    .bubble {
      position: absolute;
      border-radius: 999px;
    }

    .bubble.blue {
      width: 260px;
      height: 190px;
      right: 100px;
      top: 72px;
      background: linear-gradient(135deg, var(--pale-blue), var(--blue));
    }

    .bubble.orange {
      width: 180px;
      height: 132px;
      right: 52px;
      top: 252px;
      background: linear-gradient(135deg, var(--pale-orange), var(--orange));
    }

    .panel {
      position: absolute;
      left: 70px;
      bottom: 82px;
      width: 290px;
      height: 164px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(222, 216, 209, 0.72);
    }

    .soft-shadow {
      position: absolute;
      left: 100px;
      bottom: 44px;
      width: 330px;
      height: 28px;
      border-radius: 999px;
      background: rgba(47, 47, 47, 0.08);
    }
  </style>
</head>
<body>
  <main class="deck">
    <section class="slide">
      <div class="kicker">Modern Illustration / Editorial Deck</div>
      <h1>Calm Visual Systems for Complex Ideas</h1>
      <p class="subtitle">Soft vector illustration, refined hierarchy, and asymmetric composition for intelligent product and strategy stories.</p>
      <div class="illustration">
        <div class="soft-shadow"></div>
        <div class="bubble blue"></div>
        <div class="bubble orange"></div>
        <div class="panel"></div>
      </div>
    </section>
  </main>
</body>
</html>
